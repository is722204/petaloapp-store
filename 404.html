  <!-- GitHub Pages SPA fix: restaura la ruta después de la redirección 404 -->
  <script>
    (function(l) {
      if (l.search[1] === '/') {
        var decoded = l.search.slice(1).split('&').map(function(s) {
          return s.replace(/~and~/g, '&');
        }).join('?');
        window.history.replaceState(null, null,
          l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location));
  </script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            store: {
              DEFAULT: 'var(--store)',
              light:   'var(--store-light)',
              dark:    'var(--store-dark)'
            }
          },
          fontFamily: {
            sans: ['Nunito', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          },
          borderRadius: {
            '3xl': '1.5rem',
            '4xl': '2rem',
          },
          boxShadow: {
            'soft':   '0 2px 20px rgba(0,0,0,0.06)',
            'card':   '0 4px 24px rgba(0,0,0,0.08)',
            'store':  'var(--store-shadow)',
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    /* ── Default brand tokens (overridden at runtime by StoreService) ───────── */
    :root {
      --store:        #f3a4b5;
      --store-light:  #fce3e8;
      --store-dark:   #d97090;
      --store-shadow: 0 8px 24px rgba(243,164,181,0.45);
    }

    @layer base {
      html { scroll-behavior: smooth; }
      body {
        @apply bg-neutral-100 text-gray-800 antialiased;
        font-family: 'Nunito', sans-serif;
        overscroll-behavior-y: contain;
        -webkit-tap-highlight-color: transparent;
      }
      * { @apply box-border; }
      input, button, select, textarea {
        font-family: 'Nunito', sans-serif;
      }
    }

    @layer components {
      /* ── Phone-frame shell (desktop) ──────────────────────────── */
      .app-shell {
        @apply w-full max-w-[430px] min-h-screen bg-white relative overflow-x-hidden;
        /* subtle phone shadow on desktop */
        box-shadow: 0 0 80px rgba(0,0,0,0.18);
      }

      /* ── Buttons ──────────────────────────────────────────────── */
      .btn-store {
        @apply bg-store text-white font-bold py-4 px-6 rounded-2xl
               shadow-store active:scale-95 hover:bg-store-dark
               transition-all duration-150 flex items-center justify-center gap-2
               disabled:opacity-50 disabled:cursor-not-allowed select-none;
      }
      .btn-store-outline {
        @apply border-2 border-store text-store font-bold py-4 px-6 rounded-2xl
               active:scale-95 hover:bg-store-light
               transition-all duration-150 flex items-center justify-center gap-2
               disabled:opacity-50 disabled:cursor-not-allowed select-none;
      }
      .btn-ghost {
        @apply text-gray-500 font-semibold py-3.5 px-5 rounded-2xl
               bg-gray-100 hover:bg-gray-200 active:scale-95
               transition-all duration-150 flex items-center justify-center gap-2;
      }

      /* ── Form inputs ──────────────────────────────────────────── */
      .input-field {
        @apply w-full border-2 border-gray-100 rounded-2xl px-4 py-3.5
               focus:outline-none focus:border-store focus:ring-0
               transition-colors duration-150 bg-gray-50 text-sm font-semibold
               placeholder:font-normal placeholder:text-gray-400;
      }

      /* ── Cards ────────────────────────────────────────────────── */
      .card {
        @apply bg-white rounded-3xl shadow-soft border border-gray-100/80;
      }

      /* ── Section header ───────────────────────────────────────── */
      .section-title {
        @apply text-lg font-extrabold text-gray-900 tracking-tight;
      }

      /* ── Bottom safe area ─────────────────────────────────────── */
      .pb-safe {
        padding-bottom: max(env(safe-area-inset-bottom), 0.75rem);
      }
      .mb-safe {
        margin-bottom: max(env(safe-area-inset-bottom), 0.75rem);
      }
    }

    @layer utilities {
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .text-balance { text-wrap: balance; }
      /* Gradient text */
      .text-gradient {
        background: linear-gradient(135deg, var(--store-dark) 0%, var(--store) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
    }
  </style>
